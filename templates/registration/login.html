<!DOCTYPE html>
<html>
<head>
    <title>Login - PyFarm</title>
</head>
<body>
    <h1>PyFarm Login</h1>

    {% if form.errors %}
        <p>Login failed. Check your username and password.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>

    <p><a href="{% url 'home' %}">Back to home</a></p>
</body>
</html>
