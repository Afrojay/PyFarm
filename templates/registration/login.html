{% extends "base.html" %}

{% block title %}Login - PyFarm{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body">
                    <h1 class="h3 mb-3">PyFarm Login</h1>
                    {% if form.errors %}
                        <div class="alert alert-danger">Login failed. Check your username and password.</div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button class="btn btn-success" type="submit">Log in</button>
                        <a class="btn btn-outline-secondary" href="{% url 'home' %}">Back to home</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
