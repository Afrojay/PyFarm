<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PyFarm{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-success navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'home' %}">PyFarm</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <span class="text-white small">{{ user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-outline-light btn-sm" type="submit">Log out</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Log in</a>
                {% endif %}
                <a class="btn btn-light btn-sm" href="/admin/">Admin</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
